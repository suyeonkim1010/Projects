name: Job Matcher Testing CI

on:
  push:
    paths:
      - "job-matcher-testing/**"
      - ".github/workflows/job-matcher-testing-ci.yml"
  pull_request:
    paths:
      - "job-matcher-testing/**"
      - ".github/workflows/job-matcher-testing-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: job-matcher-testing
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run pytest
        working-directory: job-matcher-testing
        run: python -m pytest -v --cov=main --cov-report=term-missing
