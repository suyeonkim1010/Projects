<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign In · Job Tracker Studio</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="bg"></div>
    <nav class="topbar">
      <div class="topbar-inner">
        <div class="brand">Job Tracker Studio</div>
        <div class="nav-links">
          <a href="index.html">Back to app</a>
        </div>
      </div>
    </nav>

    <main class="content auth-page">
      <section class="panel auth" id="account">
        <div class="panel-header">
          <h2>Account</h2>
          <p>Sign in or create an account to sync across devices.</p>
        </div>
        <div id="authGrid" class="auth-grid">
          <label>
            Email
            <input id="authEmail" type="email" placeholder="you@email.com" />
          </label>
          <label>
            Password
            <input id="authPassword" type="password" placeholder="At least 6 characters" />
          </label>
        </div>
        <div class="actions">
          <button id="signUpBtn" class="ghost" type="button">Sign up</button>
          <button id="signInBtn" class="primary" type="button">Sign in</button>
          <button id="signOutBtn" class="danger" type="button" hidden>Sign out</button>
        </div>
        <p id="authStatus" class="hint">Not signed in</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js"></script>
  </body>
</html>
